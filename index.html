<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shuttle & Sip - Gulabji Ledger</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.344.0/font/lucide.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; background-color: #111827; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .animate-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, addDoc, deleteDoc, writeBatch, query, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        /** * 🔧 STEP 1: GO TO https://console.firebase.google.com/
         * 🔧 STEP 2: Create a project named "ShuttleSip"
         * 🔧 STEP 3: Click the "Web" icon (</>) to get your config.
         * 🔧 STEP 4: Paste your config object here:
         */
        const myVercelConfig = {
            apiKey: "", 
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        const firebaseConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : myVercelConfig;
        const appId = window.__app_id || 'shuttle-sip-v1';
        const initialToken = window.__initial_auth_token;

        let app, auth, db;
        let isConfigured = false;

        if (firebaseConfig && firebaseConfig.apiKey) {
            try {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                isConfigured = true;
            } catch (e) {
                console.error("Firebase Init Error:", e);
            }
        }

        window.FirebaseAPI = { 
            db, auth, appId, initialToken, isConfigured,
            collection, doc, setDoc, onSnapshot, updateDoc, addDoc, deleteDoc, writeBatch, query, getDoc,
            signInWithCustomToken, signInAnonymously, onAuthStateChanged 
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 20, className = "" }) => (
            <i className={`lucide-${name} ${className}`} style={{ fontSize: size }}></i>
        );

        const GULABJI_MENU = [
            { name: 'Chai', price: 30, category: 'Chai' },
            { name: 'Kulhad Chai', price: 35, category: 'Chai' },
            { name: 'Coffee', price: 35, category: 'Coffee' },
            { name: 'Black Coffee', price: 35, category: 'Coffee' },
            { name: 'Kullad Coffee', price: 40, category: 'Coffee' },
            { name: 'Milk', price: 30, category: 'Chai' },
            { name: 'Samosa', price: 30, category: 'Snacks' },
            { name: 'Kachori', price: 30, category: 'Snacks' },
            { name: 'Pyaj Kachori', price: 40, category: 'Snacks' },
            { name: 'Bun Pyaj Kachori', price: 75, category: 'Snacks' },
            { name: 'Bun Samosa', price: 60, category: 'Snacks' },
            { name: 'Bun Kachori', price: 60, category: 'Snacks' },
            { name: 'Bun Maska', price: 35, category: 'Snacks' },
            { name: 'Bread Samosa', price: 40, category: 'Snacks' },
            { name: 'Bread Kachori', price: 40, category: 'Snacks' },
            { name: 'Bread Butter', price: 40, category: 'Snacks' },
            { name: 'Bread Butter Tost', price: 60, category: 'Snacks' },
            { name: 'Brown Bread Butter Tost', price: 70, category: 'Snacks' },
            { name: 'Veg Grill Sandwich', price: 70, category: 'Sandwich' },
            { name: 'Cheese Grilled Sandwich', price: 90, category: 'Sandwich' },
            { name: 'Paneer Grill Sandwich', price: 90, category: 'Sandwich' },
            { name: 'Cheese Paneer Grill Sandwich', price: 110, category: 'Sandwich' },
            { name: 'Aloo Masala Sandwich', price: 80, category: 'Sandwich' },
            { name: 'Butter Grill Sandwich', price: 80, category: 'Sandwich' },
            { name: 'Masala Cheese Grill Sandwich', price: 100, category: 'Sandwich' },
            { name: 'Bread Butter Jam', price: 50, category: 'Snacks' },
            { name: 'Khaman Dhokla', price: 40, category: 'Snacks' },
            { name: 'Plain Maggie', price: 70, category: 'Maggie' },
            { name: 'Veg. Maggie', price: 85, category: 'Maggie' },
            { name: 'Plain Cheese Maggie', price: 80, category: 'Maggie' },
            { name: 'Veg. Cheese Maggie', price: 100, category: 'Maggie' },
            { name: 'Poha', price: 60, category: 'Snacks' },
            { name: 'Peda (1PC)', price: 25, category: 'Sweets' },
            { name: 'Peda (1KG)', price: 500, category: 'Sweets' },
        ];

        const INITIAL_PLAYERS = ["Udit", "Pankaj", "Aditya", "Naresh", "Yogesh", "Manish", "Sanjay", "Abhishek"];
        const MASTER_PIN = "2028"; 

        function App() {
            const [user, setUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false); 
            const [activeTab, setActiveTab] = useState('dashboard');
            const [members, setMembers] = useState([]);
            const [menu, setMenu] = useState([]);
            const [logs, setLogs] = useState([]);
            const [vendorBalance, setVendorBalance] = useState({ total_billed: 0, total_paid: 0 });
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isInputFocused, setIsInputFocused] = useState(false);

            const [pinInput, setPinInput] = useState('');
            const [pinError, setPinError] = useState(false);

            const [menuSearch, setMenuSearch] = useState('');
            const [selectedItems, setSelectedItems] = useState({});
            const [selectedAttendees, setSelectedAttendees] = useState([]);
            const [showQuickAddItem, setShowQuickAddItem] = useState(false);
            const [quickItem, setQuickItem] = useState({ name: '', price: '', category: 'Chai' });
            const [editingItemPrice, setEditingItemPrice] = useState(null);
            const [editingLog, setEditingLog] = useState(null);
            const [vendorPayAmount, setVendorPayAmount] = useState("");

            useEffect(() => {
                const storedAdmin = localStorage.getItem('ss_admin_active');
                if (storedAdmin === 'true') setIsAdmin(true);

                const timer = setInterval(() => {
                    if (window.FirebaseAPI) {
                        clearInterval(timer);
                        if (!window.FirebaseAPI.isConfigured) {
                            setError("Firebase Setup Required: To deploy on Vercel, you must add your Firebase API keys to index.html.");
                            setLoading(false);
                        } else {
                            initApp();
                        }
                    }
                }, 200);
                return () => clearInterval(timer);
            }, []);

            const initApp = async () => {
                const { auth, initialToken, signInWithCustomToken, signInAnonymously, onAuthStateChanged } = window.FirebaseAPI;
                try {
                    if (initialToken) await signInWithCustomToken(auth, initialToken);
                    else await signInAnonymously(auth);
                    
                    onAuthStateChanged(auth, (u) => {
                        if (u) {
                            setUser(u);
                            setupDataListeners();
                        } else {
                            setError("Auth session failed. Please refresh.");
                            setLoading(false);
                        }
                    });
                } catch (err) { 
                    console.error("Connection Error", err);
                    setError("Could not connect to Firebase. Check your keys and database rules.");
                    setLoading(false);
                }
            };

            const setupDataListeners = () => {
                const { db, appId, collection, doc, onSnapshot, writeBatch, setDoc } = window.FirebaseAPI;

                const membersRef = collection(db, 'artifacts', appId, 'public', 'data', 'members');
                const menuRef = collection(db, 'artifacts', appId, 'public', 'data', 'menu');
                const logsRef = collection(db, 'artifacts', appId, 'public', 'data', 'logs');
                const vendorRef = doc(db, 'artifacts', appId, 'public', 'data', 'vendor_account', 'main');

                onSnapshot(membersRef, async (s) => {
                    if (s.empty) {
                        const batch = writeBatch(db);
                        INITIAL_PLAYERS.forEach(name => {
                            const id = `p_${name.toLowerCase()}_${Date.now()}_${Math.random().toString(36).substring(7)}`;
                            batch.set(doc(membersRef, id), { id, name, totalOwed: 0, totalPaid: 0 });
                        });
                        await batch.commit();
                    } else setMembers(s.docs.map(d => ({id: d.id, ...d.data()})));
                }, (err) => console.error(err));

                onSnapshot(menuRef, async (s) => {
                    if (s.empty) {
                        const batch = writeBatch(db);
                        GULABJI_MENU.forEach((item, idx) => batch.set(doc(menuRef, `g_${idx}`), {id: `g_${idx}`, ...item}));
                        await batch.commit();
                    } else setMenu(s.docs.map(d => ({id: d.id, ...d.data()})));
                }, (err) => console.error(err));

                onSnapshot(vendorRef, (s) => {
                    if (s.exists()) setVendorBalance(s.data());
                    else setDoc(vendorRef, { total_billed: 0, total_paid: 0 });
                });

                onSnapshot(logsRef, (s) => {
                    setLogs(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.timestamp - a.timestamp));
                    setLoading(false);
                }, (err) => { console.error(err); setLoading(false); });
            };

            const currentTotal = Object.entries(selectedItems).reduce((sum, [id, qty]) => {
                const item = menu.find(m => m.id === id);
                return sum + (item ? item.price * qty : 0);
            }, 0);
            const perPersonSplit = selectedAttendees.length > 0 ? (currentTotal / selectedAttendees.length) : 0;
            const totalPlayerDebt = members.reduce((sum, m) => sum + ((m.totalOwed || 0) - (m.totalPaid || 0)), 0);
            const gulabjiOwed = Math.max(0, vendorBalance.total_billed - vendorBalance.total_paid);

            const handleItemQty = (id, delta) => {
                setSelectedItems(prev => {
                    const newQty = (prev[id] || 0) + delta;
                    if (newQty <= 0) { const { [id]: _, ...rest } = prev; return rest; }
                    return { ...prev, [id]: newQty };
                });
            };

            const submitLog = async () => {
                if (!isAdmin || isSubmitting || currentTotal === 0 || selectedAttendees.length === 0) return;
                setIsSubmitting(true);
                const { db, appId, collection, doc, addDoc, updateDoc, setDoc } = window.FirebaseAPI;
                
                try {
                    if (editingLog) await deleteLogEntry(editingLog.id, false);
                    const now = new Date();
                    const logData = {
                        date: now.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }),
                        time: now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true }),
                        timestamp: now.getTime(),
                        total: currentTotal,
                        split: perPersonSplit,
                        attendees: selectedAttendees,
                        items: Object.entries(selectedItems).map(([id, qty]) => {
                            const m = menu.find(i => i.id === id);
                            return { name: m?.name || "Item", qty, price: m?.price || 0 };
                        })
                    };

                    if (editingLog) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'logs', editingLog.id), logData);
                    else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), logData);

                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'vendor_account', 'main'), {
                        total_billed: (vendorBalance.total_billed || 0) + currentTotal
                    });

                    for (const aid of selectedAttendees) {
                        const m = members.find(x => x.id === aid);
                        if (m) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', aid), { totalOwed: (m.totalOwed || 0) + perPersonSplit });
                    }
                    setSelectedItems({}); setSelectedAttendees([]); setEditingLog(null); setActiveTab('dashboard');
                } catch (e) { console.error(e); } finally { setIsSubmitting(false); }
            };

            const deleteLogEntry = async (logId, shouldDeleteDoc = true) => {
                if (!isAdmin) return;
                const { db, appId, doc, deleteDoc, updateDoc } = window.FirebaseAPI;
                const log = logs.find(l => l.id === logId);
                if (!log) return;
                try {
                    const newBilled = Math.max(0, (vendorBalance.total_billed || 0) - (log.total || 0));
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'vendor_account', 'main'), { total_billed: newBilled });
                    for (const aid of log.attendees) {
                        const m = members.find(x => x.id === aid);
                        if (m) {
                            const memberRef = doc(db, 'artifacts', appId, 'public', 'data', 'members', aid);
                            const newOwed = Math.max(0, (m.totalOwed || 0) - (log.split || 0));
                            await updateDoc(memberRef, { totalOwed: newOwed });
                        }
                    }
                    if (shouldDeleteDoc) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'logs', logId));
                } catch (e) { console.error(e); }
            };

            const handleAdminLogin = () => {
                if (pinInput === MASTER_PIN) {
                    setIsAdmin(true); setPinInput(''); setPinError(false);
                    localStorage.setItem('ss_admin_active', 'true');
                } else { setPinError(true); setPinInput(''); }
            };

            const startEditLog = (log) => {
                setEditingLog(log);
                const itemsMap = {};
                log.items.forEach(item => {
                    const menuItem = menu.find(m => m.name === item.name);
                    if (menuItem) itemsMap[menuItem.id] = item.qty;
                });
                setSelectedItems(itemsMap);
                setSelectedAttendees(log.attendees);
                setActiveTab('log');
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-gray-950 text-white p-10 text-center">
                    <Icon name="loader-2" size={40} className="animate-spin text-[#D1605E] mb-4" />
                    <p className="font-black uppercase tracking-widest animate-pulse text-xs">Gulabji's Cloud Sync...</p>
                </div>
            );

            if (error) return (
                <div className="h-screen flex flex-col items-center justify-center bg-gray-950 text-white p-10 text-center">
                    <Icon name="alert-triangle" size={40} className="text-[#D1605E] mb-4" />
                    <h2 className="text-xl font-black mb-2 uppercase tracking-tighter">Setup Required</h2>
                    <p className="text-sm text-gray-400 mb-8 max-w-xs mx-auto leading-relaxed">{error}</p>
                    <div className="bg-white/5 border border-white/10 p-6 rounded-[2rem] text-left space-y-4 max-w-sm">
                        <p className="text-xs font-bold text-white uppercase tracking-widest border-b border-white/10 pb-2">How to fix:</p>
                        <div className="flex gap-3">
                            <div className="w-5 h-5 rounded-full bg-[#D1605E] text-[10px] flex items-center justify-center flex-shrink-0">1</div>
                            <p className="text-[11px] text-gray-300">Go to <b>Firebase Console</b> and create a free project.</p>
                        </div>
                        <div className="flex gap-3">
                            <div className="w-5 h-5 rounded-full bg-[#D1605E] text-[10px] flex items-center justify-center flex-shrink-0">2</div>
                            <p className="text-[11px] text-gray-300">Get your <b>Config Object</b> (Project Settings > General).</p>
                        </div>
                        <div className="flex gap-3">
                            <div className="w-5 h-5 rounded-full bg-[#D1605E] text-[10px] flex items-center justify-center flex-shrink-0">3</div>
                            <p className="text-[11px] text-gray-300">Paste it into the <b>index.html</b> file under <code className="bg-white/10 px-1">myVercelConfig</code>.</p>
                        </div>
                    </div>
                    <button onClick={() => window.location.reload()} className="mt-8 bg-white text-gray-950 px-10 py-3 rounded-2xl font-black text-sm active:scale-95 transition-all">I'VE ADDED THE KEYS</button>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen bg-[#F8F9FA] text-slate-800 pb-24 flex flex-col shadow-2xl relative overflow-x-hidden">
                    <header className={`bg-[#D1605E] text-white rounded-b-[2rem] shadow-xl border-b-4 border-[#2D6A4F] sticky top-0 z-40 transition-all ${isInputFocused ? 'p-3' : 'p-6 pt-8'}`}>
                        {!isInputFocused && (
                            <div className="flex justify-between items-start mb-4 px-1">
                                <div>
                                    <h1 className="text-2xl font-black italic tracking-tighter leading-none flex items-center gap-2">
                                        SHUTTLE & SIP {isAdmin && <Icon name="shield-check" size={16} className="text-white/60" />}
                                    </h1>
                                    <p className="text-[10px] font-bold opacity-80 mt-1 uppercase">Gulabji Chai Wale</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-[9px] font-black opacity-70 uppercase tracking-tighter">Players Owe</p>
                                    <p className="text-2xl font-black">₹{totalPlayerDebt.toFixed(0)}</p>
                                </div>
                            </div>
                        )}

                        {activeTab === 'log' && (
                            <div className="flex gap-2">
                                <div className="relative flex-1 group">
                                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-white/50">
                                        <Icon name="search" size={16} />
                                    </div>
                                    <input type="text" placeholder="Search Menu..." className="w-full bg-white/20 border border-white/30 rounded-xl py-2 pl-10 pr-4 text-sm font-bold text-white placeholder-white/60 outline-none" value={menuSearch} onFocus={() => setIsInputFocused(true)} onBlur={() => !menuSearch && setIsInputFocused(false)} onChange={(e) => setMenuSearch(e.target.value)} />
                                </div>
                                {isAdmin && (
                                    <button onClick={() => setShowQuickAddItem(!showQuickAddItem)} className={`p-2 rounded-xl border transition-all ${showQuickAddItem ? 'bg-white text-[#D1605E]' : 'bg-white/10 border-white/30'}`}><Icon name={showQuickAddItem ? "x" : "plus"} size={20} /></button>
                                )}
                            </div>
                        )}
                    </header>

                    <main className="p-4 flex-1">
                        {activeTab === 'log' && (
                            <div className="space-y-6 animate-in">
                                {isAdmin && showQuickAddItem && (
                                    <div className="bg-white p-4 rounded-3xl border-2 border-[#D1605E]/20 mb-4 shadow-xl space-y-3">
                                        <input placeholder="New Item Name" className="w-full text-sm border-b p-2 outline-none font-bold text-slate-800" value={quickItem.name} onChange={e => setQuickItem({...quickItem, name: e.target.value})} onFocus={() => setIsInputFocused(true)} />
                                        <div className="flex gap-2">
                                            <input type="number" placeholder="Price" className="w-1/2 text-sm border-b p-2 outline-none font-bold text-slate-800" value={quickItem.price} onChange={e => setQuickItem({...quickItem, price: e.target.value})} onFocus={() => setIsInputFocused(true)} />
                                            <button onClick={async () => {
                                                if(!quickItem.name || !quickItem.price) return;
                                                const { db, appId, doc, setDoc } = window.FirebaseAPI;
                                                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'menu', `q_${Date.now()}`), {id: `q_${Date.now()}`, ...quickItem, price: parseInt(quickItem.price)});
                                                setQuickItem({name:'', price:'', category:'Chai'}); setShowQuickAddItem(false); setIsInputFocused(false);
                                            }} className="flex-1 bg-[#2D6A4F] text-white text-[10px] font-black rounded-xl py-2 shadow-md">SAVE</button>
                                        </div>
                                    </div>
                                )}

                                <section>
                                    <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 px-1">1. Select Items</h2>
                                    <div className="space-y-3 max-h-[250px] overflow-y-auto no-scrollbar border-b border-slate-100 pb-2">
                                        {menu.filter(m => m.name.toLowerCase().includes(menuSearch.toLowerCase())).map(item => (
                                            <div key={item.id} className="flex items-center justify-between p-3 bg-white rounded-2xl shadow-sm border border-slate-50">
                                                <div className="flex-1">
                                                    <p className="font-bold text-xs text-slate-700 leading-tight">{item.name}</p>
                                                    <p className="text-[10px] text-[#D1605E] font-black mt-1">₹{item.price}</p>
                                                </div>
                                                <div className="flex items-center gap-2 bg-slate-50 rounded-lg p-1">
                                                    <button onClick={() => handleItemQty(item.id, -1)} className="w-7 h-7 rounded bg-white border border-slate-200 flex items-center justify-center text-[#D1605E]"><Icon name="minus" size={14}/></button>
                                                    <span className="w-4 text-center font-black text-xs">{selectedItems[item.id] || 0}</span>
                                                    <button onClick={() => handleItemQty(item.id, 1)} className="w-7 h-7 rounded bg-[#2D6A4F] text-white flex items-center justify-center"><Icon name="plus" size={14}/></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                {Object.keys(selectedItems).length > 0 && (
                                    <section className="bg-[#2D6A4F]/10 border border-[#2D6A4F]/20 rounded-2xl p-4 animate-in">
                                        <div className="flex items-center gap-2 mb-2"><Icon name="shopping-cart" size={14} className="text-[#2D6A4F]" /><h2 className="text-[10px] font-black text-[#2D6A4F] uppercase tracking-widest">Review Selection</h2></div>
                                        <div className="flex flex-wrap gap-2">
                                            {Object.entries(selectedItems).map(([id, qty]) => (
                                                <div key={id} className="bg-white px-2 py-1 rounded-lg text-[10px] font-bold border border-slate-100 flex items-center gap-1 shadow-sm">
                                                    <span className="text-[#D1605E] font-black">{qty}x</span> {menu.find(m => m.id === id)?.name}
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                )}

                                <section className="pb-44">
                                    <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 px-1">2. Attendees Selection ({selectedAttendees.length})</h2>
                                    <div className="grid grid-cols-2 gap-2">
                                        {members.sort((a,b) => a.name.localeCompare(b.name)).map(m => (
                                            <button key={m.id} onClick={() => setSelectedAttendees(p => p.includes(m.id) ? p.filter(id => id !== m.id) : [...p, m.id])} className={`flex items-center p-3 rounded-2xl border transition-all text-left ${selectedAttendees.includes(m.id) ? 'bg-[#2D6A4F] text-white border-[#2D6A4F]' : 'bg-white text-slate-500 border-slate-100 shadow-sm'}`}>
                                                <div className={`w-4 h-4 rounded flex items-center justify-center mr-2 ${selectedAttendees.includes(m.id) ? 'bg-white text-[#2D6A4F]' : 'bg-slate-100'}`}>{selectedAttendees.includes(m.id) && <Icon name="check" size={12}/>}</div>
                                                <span className="font-bold text-xs truncate">{m.name}</span>
                                            </button>
                                        ))}
                                    </div>
                                </section>

                                <div className="fixed bottom-20 left-4 right-4 bg-white/95 backdrop-blur-md shadow-2xl rounded-2xl p-4 border-2 border-slate-100 z-50 flex items-center justify-between">
                                    <div className="px-1"><p className="text-[8px] font-black text-slate-400 uppercase mb-1">Per Person</p><p className="text-2xl font-black text-slate-800 leading-none">₹{perPersonSplit.toFixed(0)}</p></div>
                                    <button disabled={!isAdmin || currentTotal === 0 || selectedAttendees.length === 0 || isSubmitting} onClick={submitLog} className={`px-8 py-3 rounded-xl font-black text-sm active:scale-95 disabled:opacity-30 transition-all flex items-center gap-2 shadow-lg ${isAdmin ? 'bg-[#D1605E] text-white' : 'bg-slate-200 text-slate-400'}`}>
                                        {isAdmin ? (isSubmitting ? "SYNCING..." : "FINALIZE LOG") : "ADMIN ONLY"} {isAdmin && <Icon name="chevron-right" size={16}/>}
                                    </button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'dashboard' && (
                            <div className="space-y-6 animate-in">
                                <section className="bg-[#2D6A4F] rounded-[2.5rem] p-6 text-white shadow-xl relative">
                                    <h2 className="text-[11px] font-black uppercase opacity-60 mb-1 tracking-widest">Gulabji Shop Account</h2>
                                    <div className="flex justify-between items-end mb-6">
                                        <p className="text-5xl font-black text-white">₹{gulabjiOwed.toFixed(0)}</p>
                                        <p className="text-[9px] uppercase opacity-50 font-black">History: ₹{vendorBalance.total_billed.toFixed(0)}</p>
                                    </div>
                                    {isAdmin && (
                                        <div className="bg-white/10 rounded-2xl p-3 border border-white/20">
                                            <p className="text-[9px] font-black uppercase mb-2 opacity-80 px-1 text-white">Record Shop Payment</p>
                                            <div className="flex gap-2">
                                                <input type="number" placeholder="Amt" className="flex-1 bg-white/20 border-white/10 rounded-xl px-4 py-2 text-sm text-white placeholder-white/40 outline-none font-bold" value={vendorPayAmount} onFocus={() => setIsInputFocused(true)} onChange={e => setVendorPayAmount(e.target.value)} />
                                                <button onClick={async () => {
                                                    const { db, appId, doc, updateDoc } = window.FirebaseAPI;
                                                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'vendor_account', 'main'), { total_paid: (vendorBalance.total_paid || 0) + (parseInt(vendorPayAmount) || 0) });
                                                    setVendorPayAmount(""); setIsInputFocused(false);
                                                }} className="bg-white text-[#2D6A4F] px-4 py-2 rounded-xl text-xs font-black active:scale-95 transition-transform">SETTLE</button>
                                            </div>
                                        </div>
                                    )}
                                </section>

                                <div className="bg-white rounded-[2rem] shadow-xl border border-slate-100 overflow-hidden divide-y divide-slate-50">
                                    {members.sort((a,b) => ((b.totalOwed||0)-(b.totalPaid||0)) - ((a.totalOwed||0)-(a.totalPaid||0))).map(m => {
                                        const bal = (m.totalOwed||0)-(m.totalPaid||0);
                                        return (
                                            <div key={m.id} className="flex items-center justify-between p-4 px-6">
                                                <div className="flex items-center gap-3"><div className="w-10 h-10 rounded-full bg-[#D1605E]/10 flex items-center justify-center text-[#D1605E] font-black uppercase text-xs">{m.name.charAt(0)}</div><p className="font-black text-sm text-slate-700">{m.name}</p></div>
                                                <div className="text-right">
                                                    <p className={`font-black text-lg leading-none mb-1 ${bal > 0 ? 'text-[#D1605E]' : 'text-[#2D6A4F]'}`}>₹{bal.toFixed(0)}</p>
                                                    {isAdmin && bal > 0 && <button onClick={async () => {
                                                        const { db, appId, doc, updateDoc } = window.FirebaseAPI;
                                                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', m.id), { totalPaid: (m.totalPaid || 0) + bal });
                                                    }} className="text-[9px] font-black bg-[#2D6A4F] text-white px-2 py-0.5 rounded-full uppercase">Settle</button>}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                <h2 className="text-[10px] font-black text-slate-400 mt-10 uppercase tracking-widest px-2">Log History</h2>
                                <div className="space-y-3 pb-10">
                                    {logs.map(l => (
                                        <div key={l.id} className="bg-white p-5 rounded-3xl border border-slate-50 shadow-md relative group">
                                            <div className="flex justify-between items-start mb-2">
                                                <div><p className="font-black text-xs text-slate-800 flex items-center gap-2 tracking-tighter">{l.date} <span className="text-[9px] text-slate-400 font-bold opacity-60">• {l.time}</span></p><p className="text-[9px] font-bold text-[#2D6A4F] uppercase tracking-widest">{l.attendees.length} Players</p></div>
                                                <div className="text-right flex flex-col items-end">
                                                    <p className="text-xl font-black text-[#D1605E]">₹{l.total}</p>
                                                    {isAdmin && <div className="flex gap-3 mt-1"><button onClick={() => startEditLog(l)} className="text-slate-300 hover:text-blue-500 active:scale-90 transition-transform"><Icon name="edit-3" size={14}/></button><button onClick={() => {
                                                        if (confirm('Delete this log?')) deleteLogEntry(l.id);
                                                    }} className="text-slate-300 hover:text-red-500 active:scale-90 transition-transform"><Icon name="trash-2" size={14}/></button></div>}
                                                </div>
                                            </div>
                                            <div className="flex flex-wrap gap-1">{l.items.map((i, idx) => (<span key={idx} className="text-[8px] font-black bg-slate-50 text-slate-400 px-2 py-0.5 rounded border border-slate-100 uppercase tracking-tighter">{i.qty}x {i.name}</span>))}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'players' && (
                            <div className="space-y-8 animate-in text-slate-600">
                                {!isAdmin ? (
                                    <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 text-center">
                                        <div className="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-6 text-slate-300 border border-slate-100"><Icon name="lock" size={36} /></div>
                                        <h2 className="text-xl font-black text-slate-800 mb-2 tracking-tighter uppercase">Admin Mode</h2>
                                        <p className="text-xs text-slate-400 uppercase tracking-widest mb-8 px-4 font-bold leading-relaxed">Enter PIN to manage group data.</p>
                                        <div className="space-y-4">
                                            <input type="password" placeholder="PIN" className={`w-full bg-slate-50 border ${pinError ? 'border-red-500 bg-red-50' : 'border-slate-200'} rounded-2xl py-4 px-4 text-center font-black tracking-[0.5em] text-lg outline-none transition-all`} value={pinInput} onChange={(e) => setPinInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleAdminLogin()} />
                                            <button onClick={handleAdminLogin} className="w-full bg-[#D1605E] text-white py-4 rounded-2xl font-black shadow-lg uppercase tracking-widest active:scale-95 transition-all">Unlock Mode</button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="space-y-8 pb-10 text-slate-600">
                                        <section className="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-lg relative">
                                            <button onClick={() => { setIsAdmin(false); localStorage.removeItem('ss_admin_active'); }} className="absolute top-4 right-4 text-[9px] font-black text-slate-400 border px-3 py-1 rounded-lg uppercase bg-slate-50 shadow-sm">Logout</button>
                                            <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 px-1 flex items-center gap-2"><Icon name="user-plus" size={12}/> Player Directory</h2>
                                            <input placeholder="Add Player Name" className="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-sm outline-none focus:border-[#D1605E] font-bold mb-4" onFocus={() => setIsInputFocused(true)} onKeyDown={async (e) => { 
                                                if (e.key === 'Enter' && e.target.value.trim()) { 
                                                    const { db, appId, doc, setDoc } = window.FirebaseAPI;
                                                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', `p_${Date.now()}`), { id: `p_${Date.now()}`, name: e.target.value.trim(), totalOwed: 0, totalPaid: 0 });
                                                    e.target.value = ''; setIsInputFocused(false);
                                                }
                                            }} />
                                            <div className="bg-slate-50 rounded-2xl divide-y divide-white overflow-hidden max-h-64 overflow-y-auto no-scrollbar border border-slate-100 shadow-inner">
                                                {members.sort((a,b) => a.name.localeCompare(b.name)).map(m => (
                                                    <div key={m.id} className="flex items-center justify-between p-4 bg-transparent group">
                                                        <span className="font-bold text-sm text-slate-700">{m.name}</span>
                                                        <button onClick={async () => { if (confirm(`Delete ${m.name}?`)) await window.FirebaseAPI.deleteDoc(window.FirebaseAPI.doc(window.FirebaseAPI.db, 'artifacts', window.FirebaseAPI.appId, 'public', 'data', 'members', m.id)); }} className="text-slate-300 hover:text-red-500 active:scale-90 transition-transform"><Icon name="trash-2" size={16}/></button>
                                                    </div>
                                                ))}
                                            </div>
                                        </section>
                                        <section className="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-lg space-y-4 opacity-50">
                                            <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1 flex items-center gap-2"><Icon name="layers" size={12}/> Squads (Upcoming)</h2>
                                            <div className="flex gap-2"><input disabled placeholder="Squads Coming Soon" className="flex-1 bg-slate-50 border rounded-xl px-4 py-3 text-sm outline-none font-bold" /> <button disabled className="bg-slate-200 text-slate-400 p-3 rounded-xl"><Icon name="plus" size={20}/></button></div>
                                        </section>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-8 py-3 flex justify-between items-center z-50">
                        <button onClick={() => {setActiveTab('log'); setIsInputFocused(false);}} className={`flex flex-col items-center transition-all active:scale-90 ${activeTab === 'log' ? 'text-[#D1605E]' : 'text-slate-400'}`}><Icon name="plus-circle" size={24}/><span className="text-[9px] font-black mt-1 uppercase tracking-tighter">Log</span></button>
                        <button onClick={() => {setActiveTab('dashboard'); setIsInputFocused(false);}} className={`flex flex-col items-center transition-all active:scale-90 ${activeTab === 'dashboard' ? 'text-[#D1605E]' : 'text-slate-400'}`}><Icon name="users" size={24}/><span className="text-[9px] font-black mt-1 uppercase tracking-tighter">Balances</span></button>
                        <button onClick={() => {setActiveTab('players'); setIsInputFocused(false);}} className={`flex flex-col items-center transition-all active:scale-90 ${activeTab === 'players' ? 'text-[#D1605E]' : 'text-slate-400'}`}><Icon name="settings" size={24}/><span className="text-[9px] font-black mt-1 uppercase tracking-tighter">Admin</span></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
