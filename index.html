<!DOCTYPE html>
<html>
<head>
  <title>Shuttle & Sip</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: Arial; padding: 20px; background:#f5f5f5; }
    h1 { color:#D1605E; }
    button { padding:10px; margin:5px; border:none; border-radius:8px; }
    .item { background:white; padding:10px; margin:5px 0; border-radius:10px; }
    .green { background:#2D6A4F; color:white; }
    .red { background:#D1605E; color:white; }
  </style>
</head>

<body>

<h1>☕ Shuttle & Sip</h1>

<h3>Add Items</h3>

<div id="menu"></div>

<h3>Total: ₹<span id="total">0</span></h3>

<button class="red" onclick="reset()">Reset</button>

<script>
const menu = [
  { name: "Chai", price: 30 },
  { name: "Coffee", price: 35 },
  { name: "Samosa", price: 30 },
  { name: "Kachori", price: 30 },
  { name: "Sandwich", price: 70 }
];

let total = 0;

function render() {
  const container = document.getElementById("menu");
  container.innerHTML = "";

  menu.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <b>${item.name}</b> - ₹${item.price}
      <br/>
      <button class="green" onclick="add(${item.price})">Add</button>
    `;

    container.appendChild(div);
  });
}

function add(price) {
  total += price;
  document.getElementById("total").innerText = total;
}

function reset() {
  total = 0;
  document.getElementById("total").innerText = 0;
}

render();
</script>

</body>
</html>
